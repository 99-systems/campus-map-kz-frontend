services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Public runtime config only — never pass secrets here.
        NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-}
    image: campus-map-kz-frontend:latest
    ports:
      - "${PORT:-80}:80"
    restart: unless-stopped
